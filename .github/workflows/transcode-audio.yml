name: Transcode Audio

on:
  push:
    branches: [main]
    paths:
      - "public/media/audio/**"

jobs:
  transcode:
    # skip commits made by this workflow itself to avoid infinite loops
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"

      - name: Transcode uploaded AAC files to Ogg Vorbis
        run: node scripts/transcode-audio.ts

      - name: Commit transcoded files
        run: |
          if git diff --quiet; then
            echo "nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/media/audio posts
          git commit -m "transcode uploaded AAC audio to Ogg Vorbis"
          git push
